<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小账本 - 记账与消费规划</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #5D9C59;
            --primary-light: #C7E9B0;
            --accent: #F4A261;
            --bg: #FAF9F6;
            --card: #FFFFFF;
            --text: #2D3436;
            --text-light: #636E72;
            --border: #E8E4DE;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --income: #5D9C59;
            --expense: #E76F51;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }

        header h1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 400;
            letter-spacing: 4px;
        }

        header p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 24px 0;
        }

        .tab-btn {
            padding: 10px 28px;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow);
        }

        .tab-btn:hover:not(.active) {
            background: var(--primary-light);
            color: var(--primary);
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
            background: var(--bg);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #4a8047;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(93, 156, 89, 0.3);
        }

        .balance-card {
            background: linear-gradient(135deg, var(--primary) 0%, #7CB342 100%);
            color: white;
            text-align: center;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .balance-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .balance-card .amount {
            font-size: 2.5rem;
            font-weight: 500;
            margin: 8px 0;
            font-family: 'ZCOOL XiaoWei', serif;
        }

        .balance-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .balance-stats .stat-item {
            text-align: center;
        }

        .balance-stats .stat-value {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .balance-stats .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .income { color: var(--income); }
        .expense { color: var(--expense); }

        .section-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 2px;
        }

        .records-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .record-item:hover {
            background: var(--bg);
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .record-info {
            flex: 1;
        }

        .record-title {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .record-meta {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .record-amount {
            font-size: 1.1rem;
            font-weight: 500;
            text-align: right;
        }

        .month-summary {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .month-nav button {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .month-nav button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .month-title {
            font-size: 1.2rem;
            font-weight: 500;
            min-width: 120px;
            text-align: center;
        }

        .category-breakdown {
            margin-top: 20px;
        }

        .category-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .category-bar {
            flex: 1;
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            margin: 0 12px;
            overflow: hidden;
        }

        .category-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .category-name {
            width: 70px;
            font-size: 0.9rem;
        }

        .category-amount {
            width: 80px;
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* 待办/消费规划样式 */
        .todo-item {
            display: flex;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }

        .todo-item:hover {
            background: var(--bg);
        }

        .todo-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--primary);
            border-radius: 6px;
            margin-right: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .todo-checkbox.checked {
            background: var(--primary);
            color: white;
        }

        .todo-checkbox.checked::after {
            content: '✓';
            font-size: 14px;
        }

        .todo-content {
            flex: 1;
        }

        .todo-title {
            font-weight: 500;
            margin-bottom: 2px;
        }

        .todo-title.completed {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .todo-amount {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .todo-actions {
            display: flex;
            gap: 8px;
        }

        .todo-btn {
            padding: 4px 8px;
            border: none;
            background: var(--bg);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .todo-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .todo-btn.delete:hover {
            background: #ffeaea;
            color: var(--expense);
        }

        .add-todo-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-todo-form input {
            flex: 1;
        }

        .add-todo-form .btn {
            padding: 10px 20px;
            white-space: nowrap;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        /* 分类颜色 */
        .category-food { background: #FFF3E0; }
        .category-transport { background: #E3F2FD; }
        .category-shopping { background: #FCE4EC; }
        .category-entertainment { background: #F3E5F5; }
        .category-living { background: #E8F5E9; }
        .category-health { background: #FFEBEE; }
        .category-education { background: #FFF8E1; }
        .category-other { background: #ECEFF1; }

        /* 消费规划卡片 */
        .planning-card {
            background: linear-gradient(135deg, #FFF8E1 0%, #FFECB3 100%);
            border: 1px solid #FFE082;
        }

        .planning-progress {
            margin-top: 16px;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .progress-fill.over {
            background: var(--expense);
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* 日期选择器样式 */
        input[type="date"] {
            color-scheme: light;
        }

        /* 导出按钮 */
        .btn-export {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-export:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(244, 162, 97, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>小账本</h1>
            <p>记录每一笔收支，规划美好生活</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="account">记账</button>
            <button class="tab-btn" data-tab="summary">月度总结</button>
            <button class="tab-btn" data-tab="plan">消费规划</button>
        </div>

        <!-- 记账页面 -->
        <div id="tab-account" class="tab-content">
            <div class="card balance-card">
                <div class="label">本月结余</div>
                <div class="amount" id="current-balance">¥0.00</div>
                <div class="balance-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="total-income">¥0.00</div>
                        <div class="stat-label">收入</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="total-expense">¥0.00</div>
                        <div class="stat-label">支出</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">添加记录</div>
                <form id="record-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>类型</label>
                            <select id="record-type">
                                <option value="expense">支出</option>
                                <option value="income">收入</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>金额</label>
                            <input type="number" id="record-amount" placeholder="0.00" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>项目</label>
                        <input type="text" id="record-desc" placeholder="例如：午餐、工资、交通..." required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>分类</label>
                            <select id="record-category">
                                <option value="food">🍔 餐饮</option>
                                <option value="transport">🚗 交通</option>
                                <option value="shopping">🛒 购物</option>
                                <option value="entertainment">🎬 娱乐</option>
                                <option value="living">🏠 生活</option>
                                <option value="health">💊 医疗</option>
                                <option value="education">📚 教育</option>
                                <option value="other">📦 其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>日期</label>
                            <input type="date" id="record-date" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">添加记录</button>
                </form>
            </div>

            <div class="card">
                <div class="section-title">近期记录</div>
                <div class="records-list" id="records-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>暂无记录，开始记账吧</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 月度总结页面 -->
        <div id="tab-summary" class="tab-content hidden">
            <div class="month-summary">
                <div class="month-header">
                    <div class="section-title">本月消费</div>
                    <div class="month-nav">
                        <button id="prev-month">‹</button>
                        <span class="month-title" id="month-title">2026年4月</span>
                        <button id="next-month">›</button>
                    </div>
                </div>
                <button class="btn btn-export" id="export-excel" style="margin-bottom: 16px; background: var(--accent); color: white;">
                    📥 导出本月Excel
                </button>

                <div class="balance-card" style="background: linear-gradient(135deg, var(--accent) 0%, #E9C46A 100%);">
                    <div class="label">本月支出</div>
                    <div class="amount" id="month-expense">¥0.00</div>
                    <div class="balance-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="month-income">¥0.00</div>
                            <div class="stat-label">收入</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="month-count">0</div>
                            <div class="stat-label">笔</div>
                        </div>
                    </div>
                </div>

                <div class="category-breakdown" id="category-breakdown">
                    <!-- 分类统计 -->
                </div>
            </div>
        </div>

        <!-- 消费规划页面 -->
        <div id="tab-plan" class="tab-content hidden">
            <div class="card planning-card">
                <div class="section-title">💰 本月预算规划</div>
                <div class="form-group">
                    <label>月度预算上限</label>
                    <input type="number" id="budget-limit" placeholder="设置每月预算..." step="0.01" min="0">
                </div>
                <div class="planning-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="budget-progress" style="width: 0%"></div>
                    </div>
                    <div class="progress-text">
                        <span id="budget-spent">已支出: ¥0.00</span>
                        <span id="budget-remaining">剩余: ¥0.00</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">📋 待办事项 / 消费计划</div>
                <form class="add-todo-form" id="todo-form">
                    <input type="text" id="todo-title" placeholder="添加消费计划..." required>
                    <input type="number" id="todo-amount" placeholder="预算金额" step="0.01" min="0">
                    <button type="submit" class="btn btn-primary">添加</button>
                </form>
                <div class="records-list" id="todo-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <p>暂无消费计划</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        const STORAGE_KEY = 'accounting_data';
        const BUDGET_KEY = 'accounting_budget';
        const TODO_KEY = 'accounting_todos';

        // 分类配置
        const categories = {
            food: { name: '餐饮', icon: '🍔', color: '#FF9800' },
            transport: { name: '交通', icon: '🚗', color: '#2196F3' },
            shopping: { name: '购物', icon: '🛒', color: '#E91E63' },
            entertainment: { name: '娱乐', icon: '🎬', color: '#9C27B0' },
            living: { name: '生活', icon: '🏠', color: '#4CAF50' },
            health: { name: '医疗', icon: '💊', color: '#F44336' },
            education: { name: '教育', icon: '📚', color: '#FFC107' },
            other: { name: '其他', icon: '📦', color: '#607D8B' }
        };

        // 自动分类关键词
        const autoCategoryKeywords = {
            food: ['早餐', '午餐', '晚餐', '外卖', '吃饭', '美食', '零食', '饮料', '奶茶', '咖啡', '水果', '买菜', '做饭'],
            transport: ['地铁', '公交', '打车', '出租', '加油', '停车', '高铁', '火车', '飞机', '出行', '交通'],
            shopping: ['淘宝', '京东', '拼多多', '网购', '快递', '衣服', '鞋子', '包包', '化妆品', '日用品'],
            entertainment: ['电影', 'KTV', '游戏', '唱歌', '旅游', '健身', '运动', '娱乐', '演出', '会员'],
            living: ['房租', '水电', '燃气', '物业', '宽带', '手机', '话费', '生活'],
            health: ['药', '医院', '看病', '体检', '医保', '保险'],
            education: ['书', '课程', '培训', '学费', '教育', '学习', '考试']
        };

        let currentMonth = new Date();
        let records = [];
        let todos = [];
        let budget = 0;

        // 初始化
        function init() {
            loadData();
            initDate();
            bindEvents();
            render();
        }

        // 加载数据
        function loadData() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                records = data ? JSON.parse(data) : [];
                const budgetData = localStorage.getItem(BUDGET_KEY);
                budget = budgetData ? parseFloat(budgetData) : 0;
                const todoData = localStorage.getItem(TODO_KEY);
                todos = todoData ? JSON.parse(todoData) : [];
            } catch (e) {
                records = [];
                todos = [];
                budget = 0;
            }
        }

        // 保存数据
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            localStorage.setItem(BUDGET_KEY, budget.toString());
            localStorage.setItem(TODO_KEY, JSON.stringify(todos));
        }

        // 初始化日期
        function initDate() {
            const today = new Date();
            const dateInput = document.getElementById('record-date');
            dateInput.value = formatDate(today);
        }

        // 格式化日期
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        // 绑定事件
        function bindEvents() {
            // Tab切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            // 记账表单
            document.getElementById('record-form').addEventListener('submit', addRecord);

            // 描述输入自动分类
            document.getElementById('record-desc').addEventListener('input', autoCategory);

            // 月份导航
            document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1));
            document.getElementById('next-month').addEventListener('click', () => changeMonth(1));

            // 预算设置
            document.getElementById('budget-limit').addEventListener('change', (e) => {
                budget = parseFloat(e.target.value) || 0;
                saveData();
                renderBudget();
            });

            // 待办表单
            document.getElementById('todo-form').addEventListener('submit', addTodo);

            // 导出Excel
            document.getElementById('export-excel').addEventListener('click', exportToExcel);
        }

        // Tab切换
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');

            if (tab === 'summary') {
                renderMonthSummary();
            } else if (tab === 'plan') {
                renderBudget();
            }
        }

        // 自动分类
        function autoCategory() {
            const desc = document.getElementById('record-desc').value;
            const categorySelect = document.getElementById('record-category');

            for (const [cat, keywords] of Object.entries(autoCategoryKeywords)) {
                if (keywords.some(kw => desc.includes(kw))) {
                    categorySelect.value = cat;
                    break;
                }
            }
        }

        // 添加记录
        function addRecord(e) {
            e.preventDefault();

            const type = document.getElementById('record-type').value;
            const amount = parseFloat(document.getElementById('record-amount').value);
            const desc = document.getElementById('record-desc').value;
            const category = document.getElementById('record-category').value;
            const date = document.getElementById('record-date').value;

            if (!amount || !desc || !date) return;

            const record = {
                id: Date.now(),
                type,
                amount,
                desc,
                category,
                date,
                createdAt: new Date().toISOString()
            };

            records.unshift(record);
            saveData();

            // 重置表单
            document.getElementById('record-amount').value = '';
            document.getElementById('record-desc').value = '';
            initDate();

            render();
        }

        // 删除记录
        function deleteRecord(id) {
            records = records.filter(r => r.id !== id);
            saveData();
            render();
        }

        // 渲染
        function render() {
            renderBalance();
            renderRecords();
            renderBudget();
        }

        // 渲染余额
        function renderBalance() {
            const now = new Date();
            const monthRecords = records.filter(r => {
                const d = new Date(r.date);
                return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
            });

            const income = monthRecords.filter(r => r.type === 'income').reduce((sum, r) => sum + r.amount, 0);
            const expense = monthRecords.filter(r => r.type === 'expense').reduce((sum, r) => sum + r.amount, 0);

            document.getElementById('current-balance').textContent = `¥${(income - expense).toFixed(2)}`;
            document.getElementById('total-income').textContent = `¥${income.toFixed(2)}`;
            document.getElementById('total-expense').textContent = `¥${expense.toFixed(2)}`;
        }

        // 渲染记录列表
        function renderRecords() {
            const list = document.getElementById('records-list');
            const recentRecords = records.slice(0, 20);

            if (recentRecords.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>暂无记录，开始记账吧</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = recentRecords.map(record => {
                const cat = categories[record.category] || categories.other;
                const amountClass = record.type === 'income' ? 'income' : 'expense';
                const amountPrefix = record.type === 'income' ? '+' : '-';
                const categoryClass = `category-${record.category}`;

                return `
                    <div class="record-item fade-in">
                        <div class="record-icon ${categoryClass}">${cat.icon}</div>
                        <div class="record-info">
                            <div class="record-title">${record.desc}</div>
                            <div class="record-meta">${cat.name} · ${record.date}</div>
                        </div>
                        <div class="record-amount ${amountClass}">
                            ${amountPrefix}¥${record.amount.toFixed(2)}
                        </div>
                        <button class="todo-btn delete" onclick="deleteRecord(${record.id})" style="margin-left: 8px;">✕</button>
                    </div>
                `;
            }).join('');
        }

        // 月份总结
        function changeMonth(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderMonthSummary();
        }

        function renderMonthSummary() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth() + 1;

            document.getElementById('month-title').textContent = `${year}年${month}月`;

            const monthRecords = records.filter(r => {
                const d = new Date(r.date);
                return d.getFullYear() === year && d.getMonth() === month - 1;
            });

            const income = monthRecords.filter(r => r.type === 'income').reduce((sum, r) => sum + r.amount, 0);
            const expense = monthRecords.filter(r => r.type === 'expense').reduce((sum, r) => sum + r.amount, 0);

            document.getElementById('month-expense').textContent = `¥${expense.toFixed(2)}`;
            document.getElementById('month-income').textContent = `¥${income.toFixed(2)}`;
            document.getElementById('month-count').textContent = monthRecords.length;

            // 分类统计
            const expenseByCategory = {};
            monthRecords.filter(r => r.type === 'expense').forEach(r => {
                expenseByCategory[r.category] = (expenseByCategory[r.category] || 0) + r.amount;
            });

            const breakdown = document.getElementById('category-breakdown');
            const sortedCategories = Object.entries(expenseByCategory).sort((a, b) => b[1] - a[1]);

            if (sortedCategories.length === 0) {
                breakdown.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>本月暂无支出记录</p>
                    </div>
                `;
                return;
            }

            breakdown.innerHTML = `
                <div class="section-title">分类明细</div>
                ${sortedCategories.map(([cat, amount]) => {
                    const catInfo = categories[cat] || categories.other;
                    const percent = expense > 0 ? (amount / expense * 100) : 0;
                    return `
                        <div class="category-item">
                            <span class="category-name">${catInfo.icon} ${catInfo.name}</span>
                            <div class="category-bar">
                                <div class="category-bar-fill" style="width: ${percent}%; background: ${catInfo.color};"></div>
                            </div>
                            <span class="category-amount">¥${amount.toFixed(2)}</span>
                        </div>
                    `;
                }).join('')}
            `;
        }

        // 预算规划
        function renderBudget() {
            document.getElementById('budget-limit').value = budget || '';

            const now = new Date();
            const monthExpense = records.filter(r => {
                const d = new Date(r.date);
                return r.type === 'expense' && d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
            }).reduce((sum, r) => sum + r.amount, 0);

            const remaining = budget - monthExpense;
            const percent = budget > 0 ? Math.min((monthExpense / budget) * 100, 100) : 0;

            const progressFill = document.getElementById('budget-progress');
            progressFill.style.width = `${percent}%`;
            progressFill.classList.toggle('over', monthExpense > budget && budget > 0);

            document.getElementById('budget-spent').textContent = `已支出: ¥${monthExpense.toFixed(2)}`;
            document.getElementById('budget-remaining').textContent = budget > 0 ? `剩余: ¥${remaining.toFixed(2)}` : '未设置预算';

            renderTodos();
        }

        // 待办事项
        function addTodo(e) {
            e.preventDefault();

            const title = document.getElementById('todo-title').value;
            const amount = parseFloat(document.getElementById('todo-amount').value) || 0;

            const todo = {
                id: Date.now(),
                title,
                amount,
                completed: false,
                createdAt: new Date().toISOString()
            };

            todos.push(todo);
            saveData();

            document.getElementById('todo-title').value = '';
            document.getElementById('todo-amount').value = '';

            renderTodos();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveData();
                renderTodos();
            }
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveData();
            renderTodos();
        }

        function renderTodos() {
            const list = document.getElementById('todo-list');

            if (todos.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <p>暂无消费计划</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = todos.map(todo => `
                <div class="todo-item fade-in">
                    <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo(${todo.id})"></div>
                    <div class="todo-content">
                        <div class="todo-title ${todo.completed ? 'completed' : ''}">${todo.title}</div>
                        ${todo.amount > 0 ? `<div class="todo-amount">预算: ¥${todo.amount.toFixed(2)}</div>` : ''}
                    </div>
                    <div class="todo-actions">
                        <button class="todo-btn delete" onclick="deleteTodo(${todo.id})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        // 导出Excel
        function exportToExcel() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth() + 1;

            // 筛选当月记录
            const monthRecords = records.filter(r => {
                const d = new Date(r.date);
                return d.getFullYear() === year && d.getMonth() === month - 1;
            });

            if (monthRecords.length === 0) {
                alert('本月暂无记录可导出');
                return;
            }

            // 按日期排序
            const sortedRecords = [...monthRecords].sort((a, b) => new Date(a.date) - new Date(b.date));

            // 构建数据
            const data = [
                [`${year}年${month}月 记账记录`],
                ['日期', '类型', '分类', '项目', '金额'],
                ...sortedRecords.map(r => [
                    r.date,
                    r.type === 'income' ? '收入' : '支出',
                    categories[r.category]?.name || '其他',
                    r.desc,
                    r.type === 'income' ? r.amount : -r.amount
                ]),
                [],
                ['统计'],
                ['总收入', sortedRecords.filter(r => r.type === 'income').reduce((sum, r) => sum + r.amount, 0)],
                ['总支出', sortedRecords.filter(r => r.type === 'expense').reduce((sum, r) => sum + r.amount, 0)],
                ['结余', sortedRecords.filter(r => r.type === 'income').reduce((sum, r) => sum + r.amount, 0) - sortedRecords.filter(r => r.type === 'expense').reduce((sum, r) => sum + r.amount, 0)],
                [],
                ['分类支出明细']
            ];

            // 分类统计
            const expenseByCategory = {};
            sortedRecords.filter(r => r.type === 'expense').forEach(r => {
                expenseByCategory[r.category] = (expenseByCategory[r.category] || 0) + r.amount;
            });

            Object.entries(expenseByCategory).forEach(([cat, amount]) => {
                data.push([categories[cat]?.name || '其他', amount]);
            });

            // 创建工作簿
            const ws = XLSX.utils.aoa_to_sheet(data);

            // 设置列宽
            ws['!cols'] = [{ wch: 12 }, { wch: 8 }, { wch: 10 }, { wch: 20 }, { wch: 12 }];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '记账记录');

            // 下载文件
            const filename = `${year}年${month}月_记账记录.xlsx`;
            XLSX.writeFile(wb, filename);
        }

        // 启动
        init();
    </script>
</body>
</html>
